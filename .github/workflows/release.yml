name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-and-upload-macos-app:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            asset_suffix: intel
          - runner: macos-15
            asset_suffix: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            uv.lock

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Build macOS app with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: main.py
          mode: app
          enable-plugins: pyside6
          macos-app-name: VMHandy
          nuitka-arguments: >-
            --macos-app-icon=assets/vmhandy.icns
            --include-data-files=assets/vmhandy.icns=assets/vmhandy.icns

      - name: Rename app bundle
        run: |
          if [ -d build/main.app ]; then
            mv build/main.app build/VMHandy.app
          fi

      - name: Archive app bundle
        run: |
          app_path="build/VMHandy.app"
          if [ ! -d "$app_path" ]; then
            echo "No .app bundle found in build/"
            exit 1
          fi

          zip_name="VMHandy-macOS-${{ matrix.asset_suffix }}-${{ github.event.release.tag_name }}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$zip_name"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "VMHandy-macOS-${{ matrix.asset_suffix }}-${{ github.event.release.tag_name }}.zip" \
            --clobber
