name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-macos-app:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            artifact_name: VMHandy-macOS-intel-app
          - runner: macos-15
            artifact_name: VMHandy-macOS-arm64-app
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            uv.lock

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Build macOS app with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: main.py
          mode: app
          enable-plugins: pyside6
          macos-app-name: VMHandy

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/*.app
          include-hidden-files: true
